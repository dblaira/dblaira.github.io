<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: 'Arial Black', Arial, sans-serif; color: #fff; min-height: 100vh; padding: 24px; }

  .label { font-size: 11px; font-weight: 900; letter-spacing: 0.2em; color: #FF01D7; text-transform: uppercase; margin-bottom: 8px; }
  .heading { font-size: 48px; font-weight: 900; color: #01FF4F; line-height: 1; margin-bottom: 24px; text-transform: uppercase; }

  .donut-wrap { display: flex; align-items: center; gap: 32px; margin-bottom: 32px; }
  .donut { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
  .donut svg { width: 140px; height: 140px; transform: rotate(-90deg); }
  .donut-score { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .donut-num { font-size: 42px; font-weight: 900; color: #01FF4F; line-height: 1; }
  .donut-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: #FF01D7; text-transform: uppercase; }

  .stats { display: flex; flex-direction: column; gap: 8px; }
  .stat-row { display: flex; flex-direction: column; }
  .stat-val { font-size: 28px; font-weight: 900; color: #FFEB00; line-height: 1; }
  .stat-key { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #00EDF5; text-transform: uppercase; }

  /* Trend */
  .section { margin-bottom: 28px; }
  .section-label { font-size: 10px; font-weight: 900; letter-spacing: 0.18em; color: #5600CC; text-transform: uppercase; border-left: 4px solid #5600CC; padding-left: 10px; margin-bottom: 12px; }

  .trend-bar-wrap { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar { flex: 1; border-radius: 4px 4px 0 0; }

  /* Log rows */
  .log-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .log-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
  .log-date { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; }
  .log-score { font-size: 24px; font-weight: 900; }
</style>
</head>
<body>

  <div class="label">Sleep</div>
  <div class="heading">Last Night</div>

  <!-- Donut + stats -->
  <div class="donut-wrap">
    <div class="donut">
      <svg viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="54" fill="none" stroke="#111" stroke-width="18"/>
        <circle cx="70" cy="70" r="54" fill="none" stroke="#01FF4F" stroke-width="18"
          stroke-dasharray="339" stroke-dashoffset="68" stroke-linecap="round"/>
      </svg>
      <div class="donut-score">
        <div class="donut-num">8.0</div>
        <div class="donut-sub">avg</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-row">
        <div class="stat-val" style="color:#FFEB00">28</div>
        <div class="stat-key">Nights logged</div>
      </div>
      <div class="stat-row">
        <div class="stat-val" style="color:#00EDF5">9.2</div>
        <div class="stat-key">Best score</div>
      </div>
      <div class="stat-row">
        <div class="stat-val" style="color:#FF01D7">6.1</div>
        <div class="stat-key">7-day avg</div>
      </div>
    </div>
  </div>

  <!-- Trend bars -->
  <div class="section">
    <div class="section-label">28-day trend</div>
    <div class="trend-bar-wrap">
      <div class="bar" style="height:40%;background:#FC0019"></div>
      <div class="bar" style="height:55%;background:#FF01D7"></div>
      <div class="bar" style="height:70%;background:#FFEB00"></div>
      <div class="bar" style="height:60%;background:#FFEB00"></div>
      <div class="bar" style="height:85%;background:#00EDF5"></div>
      <div class="bar" style="height:90%;background:#01FF4F"></div>
      <div class="bar" style="height:75%;background:#00EDF5"></div>
      <div class="bar" style="height:95%;background:#01FF4F"></div>
      <div class="bar" style="height:80%;background:#01FF4F"></div>
      <div class="bar" style="height:65%;background:#FFEB00"></div>
      <div class="bar" style="height:88%;background:#01FF4F"></div>
      <div class="bar" style="height:72%;background:#00EDF5"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="section">
    <div class="section-label">Recent entries</div>
    <div>
      <div class="log-row">
        <div class="log-date">APR 13</div>
        <div class="log-score" style="color:#01FF4F">9</div>
      </div>
      <div class="log-row">
        <div class="log-date">APR 12</div>
        <div class="log-score" style="color:#00EDF5">8</div>
      </div>
      <div class="log-row">
        <div class="log-date">APR 11</div>
        <div class="log-score" style="color:#FFEB00">6</div>
      </div>
      <div class="log-row">
        <div class="log-date">APR 10</div>
        <div class="log-score" style="color:#FF01D7">5</div>
      </div>
      <div class="log-row">
        <div class="log-date">APR 09</div>
        <div class="log-score" style="color:#FC0019">3</div>
      </div>
    </div>
  </div>

</body>
</html>
